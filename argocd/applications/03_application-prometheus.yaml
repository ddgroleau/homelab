apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 82.15.1
    helm:
      valuesObject:
        prometheus:
          prometheusSpec:
            retention: "3d"
            resources:
              requests:
                memory: "512Mi"
                cpu: "200m"
              limits:
                memory: "2Gi"
                cpu: "500m"
          route:
            main:
              enabled: true
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              hostnames: ["prometheus.homelab"]
              parentRefs:
                - name: traefik-gateway
                  namespace: default
                  kind: Gateway
              matches:
                - path:
                    type: PathPrefix
                    value: "/"

        grafana:
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"

        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "256Mi"
                cpu: "100m"

        prometheusOperator:
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

        kube-state-metrics:
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"

        prometheus-node-exporter:
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
