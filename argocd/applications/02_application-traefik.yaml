apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 39.0.6
    helm:
      valuesObject:
        ports:
          web:
            port: 8000
            http:
              redirections:
                entryPoint:
                  to: websecure
                  scheme: https
                  permanent: true
          websecure:
            port: 8443

        api:
          dashboard: true
          insecure: false

        ingressRoute:
          dashboard:
            enabled: true
            matchRule: Host(`dashboard.homelab`)
            entryPoints:
              - websecure
            middlewares:
              - name: dashboard-auth

        extraObjects:
          - apiVersion: traefik.io/v1alpha1
            kind: Middleware
            metadata:
              name: dashboard-auth
            spec:
              basicAuth:
                secret: dashboard-auth-secret

        ingressClass:
          enabled: false

        providers:
          kubernetesIngress:
            enabled: false
          kubernetesGateway:
            enabled: true

        gateway:
          listeners:
            web:
              port: 8000
              protocol: HTTP
              namespacePolicy:
                from: All

            websecure:
              port: 8443
              protocol: HTTPS
              namespacePolicy:
                from: All
              mode: Terminate
              certificateRefs:
                - kind: Secret
                  name: local-selfsigned-tls
                  group: ""

        logs:
          general:
            level: INFO
          access:
            enabled: true

        metrics:
          prometheus:
            enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
