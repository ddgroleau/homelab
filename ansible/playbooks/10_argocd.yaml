- name: Deploy ArgoCD applications
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    kubeconfig_path: "{{ lookup('ansible.builtin.env','HOME') + '/.kube/config' }}"
    kube_context: "kubernetes-admin@kubernetes"
    app_file: "../../argocd/applications/01_application-metallb.yaml"
    ip_pool_file: "../../argocd/manifests/metallb/ipaddresspool.yaml"
    traefik_file: "../../argocd/applications/02_application-traefik.yaml"
    argocd_http_route_file: "../../argocd/manifests/argocd/httproute.yaml"
    argocd_reference_grant_file: "../../argocd/manifests/argocd/referencegrant.yaml"

  tasks:
    - name: Ensure correct kube context
      ansible.builtin.shell: |
        kubectl config use-context {{ kube_context }} --kubeconfig {{ kubeconfig_path }}
      register: context_result
      failed_when: context_result.rc != 0 and "already" not in context_result.stderr
      changed_when: false

    - name: Apply MetalLB ArgoCD Application
      ansible.builtin.shell: |
        kubectl apply -f {{ app_file }} -n argocd --kubeconfig {{ kubeconfig_path }} --context {{ kube_context }}
      register: apply_result
      changed_when: "'configured' in apply_result.stdout or 'created' in apply_result.stdout"

    - name: Apply MetalLB IPAdressPool and L2Advertisement
      ansible.builtin.shell: |
        kubectl apply -f {{ ip_pool_file }} -n metallb-system --kubeconfig {{ kubeconfig_path }} --context {{ kube_context }}
      register: apply_result
      changed_when: "'configured' in apply_result.stdout or 'created' in apply_result.stdout"

    - name: Apply Traefik ArgoCD Application
      ansible.builtin.shell: |
        kubectl apply -f {{ traefik_file }} -n argocd --kubeconfig {{ kubeconfig_path }} --context {{ kube_context }}
      register: apply_result
      changed_when: "'configured' in apply_result.stdout or 'created' in apply_result.stdout"

    # - name: Install Kubernetes Gateway API CRDs
    #   ansible.builtin.shell: |
    #     kubectl apply --server-side -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.0/standard-install.yaml
    #   register: gateway_crds
    #   changed_when: false

    - name: Expose ArgoCD Dashboard via Traefik HTTPRoute
      ansible.builtin.shell: |
        kubectl apply -f {{ argocd_http_route_file }} -n default --kubeconfig {{ kubeconfig_path }} --context {{ kube_context }}
      register: apply_result
      changed_when: "'configured' in apply_result.stdout or 'created' in apply_result.stdout"

    - name: Apply ArgoCD ReferenceGrant
      ansible.builtin.shell: |
        kubectl apply -f {{ argocd_reference_grant_file }} -n argocd --kubeconfig {{ kubeconfig_path }} --context {{ kube_context }}
      register: apply_result
      changed_when: "'configured' in apply_result.stdout or 'created' in apply_result.stdout"
