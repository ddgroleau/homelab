- name: Disable swap on all hosts
  hosts: all
  become: true
  tasks:
    - name: Comment out swap entries in /etc/fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(?!#)(.*\sswap\s+.*)$'
        replace: '# \1'

    - name: Gather active swap units
     # noqa: command-instead-of-module
      ansible.builtin.command: systemctl list-units --type=swap --no-legend
      register: swap_units
      changed_when: false

    - name: Extract swap unit names
      ansible.builtin.set_fact:
        swap_unit_list: "{{ swap_units.stdout_lines | map('regex_replace', '^([^ ]+).*', '\\1') | list }}"

    - name: Mask swap units
      ansible.builtin.systemd:
        name: "{{ item }}"
        masked: true
      loop: "{{ swap_unit_list }}"

    - name: Mask swap target
      ansible.builtin.systemd:
        name: swap.target
        masked: true

    - name: Disable swap
      ansible.builtin.command:
        cmd: swapoff -a
      changed_when: true
