- name: Ensure required kernel modules and sysctl settings for Kubernetes
  hosts: all
  become: true
  tasks:
    - name: Load overlay kernel module
      ansible.builtin.command: sudo modprobe overlay
      changed_when: false

    - name: Load br_netfilter kernel module
      ansible.builtin.command: sudo modprobe br_netfilter
      changed_when: false

    - name: Configure sysctl for Kubernetes
      ansible.builtin.copy:
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        dest: /etc/sysctl.d/k8s.conf
        mode: '0644'

    - name: Apply sysctl settings
      ansible.builtin.command: sudo sysctl --system
      changed_when: false
