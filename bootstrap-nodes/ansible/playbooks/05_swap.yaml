- name: Disable swap on all hosts
  hosts: all
  become: true
  tasks:
    - name: Disable swap
      ansible.builtin.command:
        cmd: swapoff -a
      changed_when: true
    - name: Comment out swap entries in /etc/fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(?!#)(.*\sswap\s+.*)$'
        replace: '# \1'
