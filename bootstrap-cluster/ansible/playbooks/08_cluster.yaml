#########################################################################################
# 08_cluster.yaml
#
# This playbook initializes the Kubernetes cluster using kubeadm and sets up Calico CNI.
# I've tried to make it as idempotent as possible;
# There are many different configs being created across all the nodes
# So it is possible that stale configs cause issues when running multiple times
# You see this in this file - I use many different tasks to clean up state
# Some of those tasks may be redundant or uneccessesary - this is a TODO
#
#########################################################################################

- name: Initialize Kubernetes Cluster
  hosts: all
  become: true

  vars:
    control_plane_endpoint: "192.168.4.35"
    pod_network_cidr: "192.168.0.0/16"
    calico_version: "v3.31.4"

  tasks:
    - name: Set hostnames
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

    - name: Ensure all nodes are resolvable in /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ hostvars[item].ansible_default_ipv4.address }} {{ item }}"
        state: present
      loop: "{{ groups['all'] }}"

    - name: Check if cluster is initialized
      when: "'master' in group_names"
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_init_state

    - name: Reset kubeadm if cluster exists
      when:
        - "'master' in group_names"
        - kubeadm_init_state.stat.exists
      changed_when: false
      ansible.builtin.command: kubeadm reset -f

    - name: Remove CNI directories if cluster exists
      when:
        - "'master' in group_names"
        - kubeadm_init_state.stat.exists
      ansible.builtin.file:
        path: /etc/cni/net.d
        state: absent

    - name: Restart kubelet
      when:
        - "'master' in group_names"
        - kubeadm_init_state.stat.exists
      ansible.builtin.service:
        name: kubelet
        state: restarted

    - name: Ensure containerd config directory exists
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Generate default containerd config
      changed_when: false
      ansible.builtin.command: containerd config default
      register: containerd_default_config

    - name: Write containerd config to /etc/containerd/config.toml
      ansible.builtin.copy:
        content: "{{ containerd_default_config.stdout }}"
        dest: /etc/containerd/config.toml
        owner: root
        group: root
        mode: '0644'
        force: true

    - name: Set SystemdCgroup to true
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Replace CNI bin_dir path
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'bin_dir = "/usr/lib/cni"'
        replace: 'bin_dir = "/opt/cni/bin"'

    - name: Set correct sandbox image
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'sandbox_image = ".*"'
        replace: 'sandbox_image = "registry.k8s.io/pause:3.10.1"'

    - name: Restart containerd
      changed_when: false
      ansible.builtin.service:
        name: containerd
        state: restarted

    - name: Initialize Kubernetes cluster with kubeadm
      when: "'master' in group_names"
      ansible.builtin.shell: >
        kubeadm init
        --pod-network-cidr="{{ pod_network_cidr }}"
        --apiserver-advertise-address="{{ control_plane_endpoint }}"
      args:
        creates: "/etc/kubernetes/admin.conf"

    - name: Generate kubeadm join command
      when: "'master' in group_names"
      changed_when: false
      ansible.builtin.shell: |
        kubeadm token create --print-join-command
      register: join_command
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Print worker join command
      when: "'master' in group_names"
      ansible.builtin.debug:
        var: join_command

    - name: Copy kubeconfig to control node (dev machine)
      when: "'master' in group_names"
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: ~/.kube/homelab_kubeconfig.yaml
        flat: true

    - name: Install the Tigera Operator and custom resource definitions
      when: "'master' in group_names"
      changed_when: false
      ansible.builtin.shell: >
        kubectl apply -f
        https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/tigera-operator.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Wait for Installation CRD to be registered
      ansible.builtin.shell: >
        kubectl get crd installations.operator.tigera.io
      when: "'master' in group_names"
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: crd_check
      retries: 20
      delay: 15
      until: crd_check.rc == 0
      changed_when: false

    - name: Install Calico CNI
      when: "'master' in group_names"
      changed_when: false
      ansible.builtin.shell: >
        kubectl apply -f
        https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/custom-resources.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Remove stale kubelet.conf
      when: "'workers' in group_names"
      ansible.builtin.file:
        path: /etc/kubernetes/kubelet.conf
        state: absent

    - name: Reset kubeadm on worker nodes if already joined
      when:
        - "'workers' in group_names"
      changed_when: false
      ansible.builtin.command: kubeadm reset -f

    - name: Join worker nodes
      when: "'workers' in group_names"
      ansible.builtin.shell: >
        {{ hostvars[groups['master'][0]].join_command.stdout }}
      args:
        creates: /etc/kubernetes/kubelet.conf

    # Containerd needs to be restarted on worker nodes after join to ensure the new CNI configuration is picked up
    - name: Restart containerd on worker nodes after join
      when: "'workers' in group_names"
      ansible.builtin.service:
        name: containerd
        state: restarted
